---
- name: Install NFS server
  apt:
    name: nfs-kernel-server
    state: present
    update_cache: true
  when: nfs_role == 'server'

- name: Install NFS client
  apt:
    name: nfs-common
    state: present
    update_cache: true
  when: nfs_role == 'client'

- name: Create NFS export directory
  file:
    path: "{{ nfs_export_dir }}"
    state: directory
    owner: "33"
    group: "33"
    mode: '0770'
  when: nfs_role == 'server'

- name: Create shared Nextcloud directories on NFS storage
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "33"
    group: "33"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ nfs_export_dir }}/config", mode: "0770" }
    - { path: "{{ nfs_export_dir }}/apps", mode: "0770" }
  when: nfs_role == 'server'

- name: Ensure exports.d exists
  file:
    path: /etc/exports.d
    state: directory
    mode: '0755'
  when: nfs_role == 'server'

- name: Create Nextcloud data markers on NFS storage
  file:
    path: "{{ item.path }}"
    state: touch
    owner: "33"
    group: "33"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ nfs_export_dir }}/.ocdata", mode: "0640" }
    - { path: "{{ nfs_export_dir }}/nextcloud.log", mode: "0660" }
  when: nfs_role == 'server'

- name: Configure NFS exports
  copy:
    dest: /etc/exports.d/nextcloud.exports
    mode: '0644'
    content: |
      {{ nfs_export_dir }} {{ dmz_network }}(rw,sync,no_subtree_check,no_root_squash) {{ internal_network }}(rw,sync,no_subtree_check,no_root_squash)
  notify: restart nfs
  when: nfs_role == 'server'

- name: Enable and start NFS server
  service:
    name: nfs-kernel-server
    state: started
    enabled: true
  when: nfs_role == 'server'

- name: Apply NFS export changes immediately
  meta: flush_handlers
  when: nfs_role == 'server'

- name: Create mount point on client
  file:
    path: "{{ nfs_mount_point }}"
    state: directory
  when: nfs_role == 'client'

- name: Mount NFS share
  mount:
    path: "{{ nfs_mount_point }}"
    src: "{{ nfs_server }}:{{ nfs_export_dir }}"
    fstype: nfs
    opts: rw,sync,hard,nfsvers=4.2
    state: mounted
  when: nfs_role == 'client'

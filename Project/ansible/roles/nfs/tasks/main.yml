---
- name: Install NFS server
  apt:
    name: nfs-kernel-server
    state: present
    update_cache: true
  when: nfs_role == 'server'

- name: Install NFS client
  apt:
    name: nfs-common
    state: present
    update_cache: true
  when: nfs_role == 'client'

- name: Create NFS export directory
  file:
    path: "{{ nfs_export_dir }}"
    state: directory
    mode: '0777'
  when: nfs_role == 'server'

- name: Configure NFS exports
  lineinfile:
    path: /etc/exports
    line: "{{ nfs_export_dir }} {{ internal_network }}(rw,sync,no_subtree_check,no_root_squash) {{ dmz_network }}(rw,sync,no_subtree_check,no_root_squash)"
    create: true
  notify: restart nfs
  when: nfs_role == 'server'

- name: Enable and start NFS server
  service:
    name: nfs-kernel-server
    state: started
    enabled: true
  when: nfs_role == 'server'

- name: Create mount point on client
  file:
    path: /mnt/nextcloud
    state: directory
  when: nfs_role == 'client'

- name: Mount NFS share
  mount:
    path: /mnt/nextcloud
    src: "{{ nfs_server }}:{{ nfs_export_dir }}"
    fstype: nfs
    opts: rw,sync,hard
    state: mounted
  when: nfs_role == 'client'

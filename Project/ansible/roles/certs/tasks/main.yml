---
- name: Install openssl
  apt:
    name: openssl
    state: present

- name: Create certs directory
  file:
    path: "{{ certs_dir }}"
    state: directory
    mode: '0755'

# --- CA ---
- name: Generate CA private key
  command: >
    openssl genrsa -out {{ certs_dir }}/ca.key 4096
  args:
    creates: "{{ certs_dir }}/ca.key"

- name: Generate CA certificate
  command: >
    openssl req -new -x509 -days {{ certs_days }}
    -key {{ certs_dir }}/ca.key
    -out {{ certs_dir }}/ca.crt
    -subj "/C={{ certs_country }}/O={{ certs_org }}/CN={{ certs_org }} CA"
  args:
    creates: "{{ certs_dir }}/ca.crt"

# --- Server cert ---
- name: Generate server private key
  command: >
    openssl genrsa -out {{ certs_dir }}/server.key 2048
  args:
    creates: "{{ certs_dir }}/server.key"

- name: Generate server CSR
  command: >
    openssl req -new
    -key {{ certs_dir }}/server.key
    -out {{ certs_dir }}/server.csr
    -subj "/C={{ certs_country }}/O={{ certs_org }}/CN={{ nextcloud_domain }}"
  args:
    creates: "{{ certs_dir }}/server.csr"

- name: Copy openssl extensions config
  template:
    src: openssl_ext.cnf.j2
    dest: "{{ certs_dir }}/openssl_ext.cnf"

- name: Sign server certificate with CA
  command: >
    openssl x509 -req -days {{ certs_days }}
    -in {{ certs_dir }}/server.csr
    -CA {{ certs_dir }}/ca.crt
    -CAkey {{ certs_dir }}/ca.key
    -CAcreateserial
    -extfile {{ certs_dir }}/openssl_ext.cnf
    -out {{ certs_dir }}/server.crt
  args:
    creates: "{{ certs_dir }}/server.crt"

- name: Set permissions on private key
  file:
    path: "{{ certs_dir }}/server.key"
    mode: '0640'

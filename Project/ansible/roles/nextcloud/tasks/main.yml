---
- name: Create nextcloud directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/nextcloud
    - /var/lib/nextcloud/config
    - /var/lib/nextcloud/apps

- name: Ensure Nextcloud data directory exists on mounted storage
  file:
    path: /mnt/nextcloud
    state: directory
    owner: '33'
    group: '33'
    mode: '0770'

- name: Ensure Nextcloud data directory marker exists
  file:
    path: /mnt/nextcloud/.ocdata
    state: touch
    owner: '33'
    group: '33'
    mode: '0640'

- name: Ensure Nextcloud data directory contents belong to www-data
  file:
    path: /mnt/nextcloud
    owner: '33'
    group: '33'
    recurse: true

- name: Ensure Nextcloud log file exists and is writable
  file:
    path: /mnt/nextcloud/nextcloud.log
    state: touch
    owner: '33'
    group: '33'
    mode: '0660'

- name: Copy docker-compose
  template:
    src: docker-compose.yml.j2
    dest: /opt/nextcloud/docker-compose.yml
  notify: restart nextcloud

- name: Copy nginx config
  template:
    src: nginx.conf.j2
    dest: /opt/nextcloud/nginx.conf
  notify: restart nextcloud

- name: Start Nextcloud
  shell: docker compose up -d
  args:
    chdir: /opt/nextcloud
  changed_when: false

- name: Wait for Nextcloud to be ready
  wait_for:
    port: 9000
    host: 127.0.0.1
    delay: 10
    timeout: 120

- name: Fix Nextcloud data directory permissions from inside container
  shell: >
    docker exec -u 0 nextcloud sh -c
    'mkdir -p /var/www/html/data &&
     touch /var/www/html/data/.ocdata /var/www/html/data/nextcloud.log &&
     chown -R www-data:www-data /var/www/html/data &&
     chmod 0770 /var/www/html/data &&
     chmod 0640 /var/www/html/data/.ocdata &&
     chmod 0660 /var/www/html/data/nextcloud.log'
  args:
    chdir: /opt/nextcloud
  changed_when: false

- name: Verify Nextcloud data directory is writable for www-data
  shell: >
    docker exec -u www-data nextcloud sh -c
    'test -w /var/www/html/data &&
     touch /var/www/html/data/.ansible_write_test &&
     rm -f /var/www/html/data/.ansible_write_test'
  args:
    chdir: /opt/nextcloud
  register: nextcloud_data_writable
  retries: 5
  delay: 3
  until: nextcloud_data_writable.rc == 0
  changed_when: false

- name: Update Nextcloud trusted domains
  shell: >
    docker exec -u www-data nextcloud php occ
    config:system:set trusted_domains {{ trusted_domain_index }}
    --value="{{ item }}"
  args:
    chdir: /opt/nextcloud
  loop:
    - "{{ nextcloud_vip }}"
    - "{{ nextcloud_domain }}"
    - "{{ nextcloud1_dmz_ip }}"
    - "{{ nextcloud2_dmz_ip }}"
  loop_control:
    index_var: trusted_domain_index
  changed_when: false

---
- name: Create backup directory
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0750'
  when: postgres_role | default('primary') == 'primary'

- name: Install backup dependencies
  apt:
    name:
      - gzip
      - postgresql-client
    state: present
    update_cache: true
  when: postgres_role | default('primary') == 'primary'

- name: Copy backup script
  template:
    src: pg_backup.sh.j2
    dest: /usr/local/bin/pg_backup.sh
    mode: '0750'
  when: postgres_role | default('primary') == 'primary'

- name: Schedule nightly backup
  cron:
    name: "PostgreSQL nightly backup"
    hour: "2"
    minute: "0"
    job: "/usr/local/bin/pg_backup.sh >> /var/log/pg_backup.log 2>&1"
  when: postgres_role | default('primary') == 'primary'

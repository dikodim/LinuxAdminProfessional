---
# Re-apply configuration after Terraform recreates a VM from the template.
# Examples:
#   ansible-playbook -i inventory.ini recover.yml --limit nextcloud-02
#   ansible-playbook -i inventory.ini recover.yml --limit postgres-replica -e postgres_force_resync=true
#   GRAFANA_SMTP_PASSWORD=... ansible-playbook -i inventory.ini recover.yml --limit services-1

- name: Recover services node
  hosts: services
  become: true
  strategy: free
  roles:
    - role: dns
    - role: grow_rootfs
      tags: [rootfs]
    - role: storage_cleanup
    - role: docker
    - role: rsyslog
      vars:
        rsyslog_role: server
    - role: nfs
      vars:
        nfs_role: server
    - role: services_stack
  tags: [services, monitoring, nfs, logs]

- name: Recover PostgreSQL primary
  hosts: postgres_primary
  become: true
  strategy: free
  roles:
    - role: dns
    - role: grow_rootfs
      tags: [rootfs]
    - role: storage_cleanup
    - role: node_exporter
    - role: rsyslog
      vars:
        rsyslog_role: client
    - role: postgres_native
    - role: postgres_exporter
    - role: backup
  tags: [postgres, postgres-primary, metrics, logs]

- name: Recover PostgreSQL replica
  hosts: postgres_replica
  become: true
  strategy: free
  vars:
    postgres_force_resync: true
  roles:
    - role: dns
    - role: grow_rootfs
      tags: [rootfs]
    - role: storage_cleanup
    - role: node_exporter
    - role: rsyslog
      vars:
        rsyslog_role: client
    - role: postgres_native
    - role: postgres_exporter
  tags: [postgres, postgres-replica, metrics, logs]

- name: Recover Nextcloud node
  hosts: nextcloud
  become: true
  strategy: free
  roles:
    - role: dns
    - role: grow_rootfs
      tags: [rootfs]
    - role: storage_cleanup
    - role: docker
    - role: node_exporter
    - role: rsyslog
      vars:
        rsyslog_role: client
    - role: certs
    - role: nfs
      vars:
        nfs_role: client
    - role: nextcloud
    - role: keepalived
  tags: [nextcloud, metrics, logs]

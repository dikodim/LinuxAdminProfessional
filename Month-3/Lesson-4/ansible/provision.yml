---
- name: Configure PAM access restrictions
  hosts: pam
  become: true

  vars:
    admin_users:
      - vagrant
      - root
      - otusadm
    user_password: "Otus2022!"

  tasks:

    # ── 1. SSH — разрешить аутентификацию по паролю ────────────────────────
    - name: Allow SSH password authentication in sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
      notify: Restart sshd

    # Ubuntu 22.04: cloud-init кладёт PasswordAuthentication no в drop-in файл,
    # который имеет приоритет над основным конфигом через Include *.conf
    - name: Override cloud-init SSH config (disable PasswordAuthentication no)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/50-cloud-init.conf
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
        create: true
      notify: Restart sshd

    # ── 2. Пользователи и группы ───────────────────────────────────────────
    - name: Create group admin
      ansible.builtin.group:
        name: admin
        state: present

    - name: Create user otus
      ansible.builtin.user:
        name: otus
        shell: /bin/bash
        create_home: true

    - name: Create user otusadm
      ansible.builtin.user:
        name: otusadm
        shell: /bin/bash
        create_home: true

    - name: Set password for otus
      ansible.builtin.user:
        name: otus
        password: "{{ user_password | password_hash('sha512') }}"

    - name: Set password for otusadm
      ansible.builtin.user:
        name: otusadm
        password: "{{ user_password | password_hash('sha512') }}"

    - name: Add admin users to group admin
      ansible.builtin.user:
        name: "{{ item }}"
        groups: admin
        append: true
      loop: "{{ admin_users }}"

    # ── 3. Скрипт контроля доступа ─────────────────────────────────────────
    - name: Deploy PAM login script
      ansible.builtin.copy:
        dest: /usr/local/bin/login.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Запрещаем вход всем пользователям кроме группы admin в выходные дни
          if [ $(date +%a) = "Sat" ] || [ $(date +%a) = "Sun" ]; then
            if getent group admin | grep -qw "$PAM_USER"; then
              exit 0
            else
              exit 1
            fi
          else
            exit 0
          fi

    # ── 4. PAM: подключить скрипт к sshd ──────────────────────────────────
    - name: Add pam_exec rule to /etc/pam.d/sshd
      ansible.builtin.lineinfile:
        path: /etc/pam.d/sshd
        insertafter: '@include common-auth'
        line: 'auth required pam_exec.so debug /usr/local/bin/login.sh'
        state: present

    # ── 5. ⭐ Бонус: пользователь dockeruser с доступом к Docker ───────────
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Create user dockeruser
      ansible.builtin.user:
        name: dockeruser
        shell: /bin/bash
        create_home: true
        groups: docker
        append: true

    - name: Set password for dockeruser
      ansible.builtin.user:
        name: dockeruser
        password: "{{ user_password | password_hash('sha512') }}"

    - name: Allow dockeruser to restart Docker via sudo
      ansible.builtin.copy:
        dest: /etc/sudoers.d/dockeruser
        content: |
          dockeruser ALL=(ALL) NOPASSWD: /bin/systemctl restart docker
        mode: '0440'
        validate: 'visudo -cf %s'

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted

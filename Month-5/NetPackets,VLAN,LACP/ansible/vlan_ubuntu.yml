---
- name: Configure VLAN on Ubuntu hosts
  hosts: testClient2,testServer2
  become: yes
  tasks:
    - name: Create VLAN interface configuration
      template:
        src: templates/50-cloud-init.yaml.j2
        dest: /etc/netplan/50-cloud-init.yaml
        owner: root
        group: root
        mode: 0644

    - name: Apply network configuration
      shell: netplan apply
      become: yes
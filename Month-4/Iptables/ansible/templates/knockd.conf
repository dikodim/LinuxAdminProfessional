[options]
    UseSyslog
    # Слушаем на интерфейсе, смотрящем в сторону centralRouter
    Interface = enp0s8

[openSSH]
    sequence    = 7000,8000,9000
    seq_timeout = 5
    # Добавляем правило в начало цепочки INPUT — разрешаем SSH с IP клиента
    command     = /sbin/iptables -I INPUT 1 -s %IP% -p tcp --dport 22 -j ACCEPT
    tcpflags    = syn

[closeSSH]
    sequence    = 9000,8000,7000
    seq_timeout = 5
    # Удаляем правило — закрываем SSH для IP клиента
    command     = /sbin/iptables -D INPUT -s %IP% -p tcp --dport 22 -j ACCEPT
    tcpflags    = syn

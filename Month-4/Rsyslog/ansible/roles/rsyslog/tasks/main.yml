- name: Update apt cache
  apt:
    update_cache: yes

- name: Install rsyslog
  apt:
    name: rsyslog
    state: present

- name: Template rsyslog.conf
  ansible.builtin.template:
    src: rsyslog.conf.j2
    dest: /etc/rsyslog.conf

- name: Restart rsyslog
  service:
    name: rsyslog
    state: restarted
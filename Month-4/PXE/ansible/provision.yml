---
- name: Configure PXE server
  hosts: pxeserver
  become: true

  vars:
    tftp_root: /srv/tftp
    images_dir: /srv/images
    ks_dir: /srv/ks
    netboot_url: "http://cdimage.ubuntu.com/ubuntu-server/noble/daily-live/current/noble-netboot-amd64.tar.gz"
    iso_url: "http://cdimage.ubuntu.com/ubuntu-server/noble/daily-live/current/noble-live-server-amd64.iso"

  tasks:

    # ── 1. Базовые пакеты ──────────────────────────────────────────────────
    - name: Enable IPv4 forwarding
      ansible.builtin.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        sysctl_set: true

    - name: Enable NAT masquerade for pxeclient internet access
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        out_interface: eth0
        jump: MASQUERADE

    - name: Disable firewall (ufw)
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install dnsmasq and apache2
      ansible.builtin.apt:
        name:
          - dnsmasq
          - apache2
          - wget
        state: present

    # ── 2. DHCP/TFTP — dnsmasq ────────────────────────────────────────────
    - name: Create TFTP root directory
      ansible.builtin.file:
        path: "{{ tftp_root }}"
        state: directory
        mode: '0755'

    - name: Deploy dnsmasq PXE config
      ansible.builtin.template:
        src: templates/pxe.conf.j2
        dest: /etc/dnsmasq.d/pxe.conf
        mode: '0644'
      notify: Restart dnsmasq

    - name: Download Ubuntu 24.04 netboot tarball
      ansible.builtin.get_url:
        url: "{{ netboot_url }}"
        dest: "/tmp/noble-netboot-amd64.tar.gz"
        timeout: 600

    - name: Extract netboot files to TFTP root
      ansible.builtin.unarchive:
        src: /tmp/noble-netboot-amd64.tar.gz
        dest: "{{ tftp_root }}"
        remote_src: true

    # ── 3. Web-сервер — apache2 ───────────────────────────────────────────
    - name: Create /srv/images directory
      ansible.builtin.file:
        path: "{{ images_dir }}"
        state: directory
        mode: '0755'

    - name: Download Ubuntu 24.04 server ISO
      ansible.builtin.get_url:
        url: "{{ iso_url }}"
        dest: "{{ images_dir }}/noble-live-server-amd64.iso"
        timeout: 3600

    - name: Deploy apache2 virtual host config
      ansible.builtin.template:
        src: templates/ks-server.conf.j2
        dest: /etc/apache2/sites-available/ks-server.conf
        mode: '0644'
      notify: Restart apache2

    - name: Disable default Apache site
      ansible.builtin.command: a2dissite 000-default.conf
      args:
        removes: /etc/apache2/sites-enabled/000-default.conf
      notify: Restart apache2

    - name: Enable ks-server site
      ansible.builtin.command: a2ensite ks-server.conf
      args:
        creates: /etc/apache2/sites-enabled/ks-server.conf
      notify: Restart apache2

    # ── 4. Автоматическая установка — user-data (cloud-init autoinstall) ──
    - name: Create /srv/ks directory
      ansible.builtin.file:
        path: "{{ ks_dir }}"
        state: directory
        mode: '0755'

    - name: Deploy user-data for autoinstall
      ansible.builtin.template:
        src: templates/user-data.j2
        dest: "{{ ks_dir }}/user-data"
        mode: '0644'

    - name: Create empty meta-data file
      ansible.builtin.file:
        path: "{{ ks_dir }}/meta-data"
        state: touch
        mode: '0644'

    # ── 5. PXE boot menu ──────────────────────────────────────────────────
    - name: Deploy pxelinux.cfg/default
      ansible.builtin.template:
        src: templates/pxelinux.cfg.default.j2
        dest: "{{ tftp_root }}/amd64/pxelinux.cfg/default"
        mode: '0644'

  handlers:
    - name: Restart dnsmasq
      ansible.builtin.systemd:
        name: dnsmasq
        state: restarted

    - name: Restart apache2
      ansible.builtin.systemd:
        name: apache2
        state: restarted

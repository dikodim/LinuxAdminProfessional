---
- name: Install base tools on all hosts
  hosts: all
  become: yes
  tasks:
    - name: install base tools
      apt:
        name:
          - vim
          - telnet
        state: present
        update_cache: true

- name: Install postgres 14 and set up replication
  hosts: node1,node2
  become: yes
  roles:
    - install_postgres
    - postgres_replication

- name: Set up backup
  hosts: all
  become: yes
  roles:
    - install_barman

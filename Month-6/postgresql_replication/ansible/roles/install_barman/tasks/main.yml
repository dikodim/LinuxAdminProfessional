---
# Install python packages required for postgresql and user modules
- name: Install base tools
  apt:
    name:
      - python3-pexpect
      - python3-psycopg2
      - bash-completion
      - wget
    state: present
    update_cache: true

# Install barman and postgresql-client on barman host
- name: Install barman and postgresql packages on barman
  apt:
    name:
      - barman
      - barman-cli
      - postgresql-client
    state: present
    update_cache: true
  when: ansible_hostname == "barman"

# Install barman-cli on node1 and node2
- name: Install barman-cli on nodes
  apt:
    name:
      - barman-cli
    state: present
    update_cache: true
  when: ansible_hostname != "barman"

# Generate SSH key for postgres user on node1
- name: Generate SSH key for postgres user on node1
  user:
    name: postgres
    generate_ssh_key: yes
    ssh_key_type: rsa
    ssh_key_bits: 4096
    force: no
  when: ansible_hostname == "node1"

# Generate SSH key for barman user on barman host
- name: Generate SSH key for barman user on barman
  user:
    name: barman
    shell: /bin/bash
    generate_ssh_key: yes
    ssh_key_type: rsa
    ssh_key_bits: 4096
    force: no
  when: ansible_hostname == "barman"

# Fetch public SSH key from node1 (postgres user)
- name: Fetch public SSH key from node1
  shell: cat /var/lib/postgresql/.ssh/id_rsa.pub
  register: node1_ssh_key
  when: ansible_hostname == "node1"

# Copy node1's public key to barman's authorized_keys
- name: Transfer node1 public key to barman
  delegate_to: barman
  authorized_key:
    key: "{{ node1_ssh_key.stdout }}"
    comment: "{{ ansible_hostname }}"
    user: barman
  when: ansible_hostname == "node1"

# Fetch public SSH key from barman host
- name: Fetch public SSH key from barman
  shell: cat /var/lib/barman/.ssh/id_rsa.pub
  register: barman_ssh_key
  when: ansible_hostname == "barman"

# Copy barman's public key to node1's authorized_keys (postgres user)
- name: Transfer barman public key to node1
  delegate_to: node1
  authorized_key:
    key: "{{ barman_ssh_key.stdout }}"
    comment: "{{ ansible_hostname }}"
    user: postgres
  when: ansible_hostname == "barman"

# CREATE USER barman SUPERUSER;
- name: Create barman superuser in postgres
  become_user: postgres
  postgresql_user:
    name: barman
    password: "{{ barman_user_password }}"
    role_attr_flags: SUPERUSER
    login_unix_socket: /var/run/postgresql
  ignore_errors: true
  when: ansible_hostname == "node1"

# Add barman access to pg_hba.conf on node1 and node2
- name: Add barman access to pg_hba.conf (all access)
  lineinfile:
    path: /etc/postgresql/14/main/pg_hba.conf
    line: "host    all             {{ barman_user }}    {{ barman_ip }}/32    scram-sha-256"
  when: ansible_hostname == "node1" or
        ansible_hostname == "node2"

- name: Add barman replication access to pg_hba.conf
  lineinfile:
    path: /etc/postgresql/14/main/pg_hba.conf
    line: "host    replication     {{ barman_user }}    {{ barman_ip }}/32    scram-sha-256"
  when: ansible_hostname == "node1" or
        ansible_hostname == "node2"

# Reload postgresql to apply pg_hba.conf changes
- name: Reload postgresql on node1
  service:
    name: postgresql
    state: reloaded
  when: ansible_hostname == "node1"

# Create test database 'otus' on node1
- name: Create database otus on node1
  become_user: postgres
  postgresql_db:
    name: otus
    encoding: UTF-8
    template: template0
    state: present
    login_unix_socket: /var/run/postgresql
  when: ansible_hostname == "node1"

# Create test table in database otus
- name: Create test table in otus database
  become_user: postgres
  postgresql_table:
    db: otus
    name: test1
    state: present
    login_unix_socket: /var/run/postgresql
  when: ansible_hostname == "node1"

# Copy .pgpass file to barman host
- name: Copy .pgpass to barman
  template:
    src: .pgpass.j2
    dest: /var/lib/barman/.pgpass
    owner: barman
    group: barman
    mode: '0600'
  when: ansible_hostname == "barman"

# Copy barman.conf
- name: Copy barman.conf
  template:
    src: barman.conf.j2
    dest: /etc/barman.conf
    owner: barman
    group: barman
    mode: '0755'
  when: ansible_hostname == "barman"

# Copy node1.conf (backup job configuration)
- name: Copy node1.conf
  template:
    src: node1.conf.j2
    dest: /etc/barman.d/node1.conf
    owner: barman
    group: barman
    mode: '0755'
  when: ansible_hostname == "barman"

# Switch WAL to allow barman to start archiving
- name: Run barman switch-wal for node1
  become_user: barman
  shell: barman switch-wal node1
  ignore_errors: true
  when: ansible_hostname == "barman"

# Run barman cron to start WAL archiving
- name: Run barman cron
  become_user: barman
  shell: barman cron
  ignore_errors: true
  when: ansible_hostname == "barman"
